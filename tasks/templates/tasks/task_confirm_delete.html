{% extends 'tasks/base.html' %}
{% block content %}
<h1>Supprimer la tâche</h1>
<p>Voulez-vous vraiment supprimer « {{ object.titre }} » ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmer</button>
    <a href="{% url 'task_detail' object.pk %}">Annuler</a>
</form>
{% endblock %}
