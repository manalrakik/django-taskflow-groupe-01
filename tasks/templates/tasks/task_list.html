{% extends 'tasks/base.html' %}
{% block content %}
<h1>Mes tâches</h1>
<a href="{% url 'task_create' %}" class="btn">+ Nouvelle tâche</a>

<form method="get" class="filter-bar">
    <input type="text" name="q" placeholder="Rechercher par titre..." value="{{ recherche }}">

    <select name="statut">
        <option value="">Tous les statuts</option>
        {% for value, label in statut_choices %}
            <option value="{{ value }}" {% if statut_selectionne == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>

    <select name="priorite">
        <option value="">Toutes les priorités</option>
        {% for value, label in priorite_choices %}
            <option value="{{ value }}" {% if priorite_selectionnee == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>

    <button type="submit" class="btn btn-secondary">Filtrer</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Réinitialiser</a>
</form>

<div>
    {% for task in tasks %}
        <div class="task-card">
            <a href="{% url 'task_detail' task.pk %}" class="task-title" {% if task.statut == 'termine' %}style="text-decoration: line-through; color: var(--text-muted);"{% endif %}>{{ task.titre }}</a>
            <div class="task-meta">
                <span class="badge badge-{{ task.priorite }}">{{ task.get_priorite_display }}</span>
                <span class="badge badge-{{ task.statut }}">{{ task.get_statut_display }}</span>
            </div>
        </div>
    {% empty %}
        <p>Aucune tâche ne correspond à ces critères.</p>
    {% endfor %}
</div>
{% endblock %}
